server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

  flyway:
    flyway:
      enabled: true
      locations: classpath:db/migration
      baseline-on-migrate: false    # ← change true to false
      out-of-order: false

logging:
  level:
    org.springframework.security: INFO
    org.flywaydb: DEBUG

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

  jwt:
    secret: ${JWT_SECRET}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false