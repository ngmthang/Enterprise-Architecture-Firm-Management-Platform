spring:
  application:
    name: architectureplatform

  datasource:
    url: jdbc:postgresql://localhost:5432/architecture_platform
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.security: DEBUG
    org.flywaydb: INFO

app:
  jwt:
    secret: change-this-to-a-long-random-secret-key-at-least-32-characters
    access-token-expiration: 3600000
    refresh-token-expiration: 604800000