spring:
  application:
    name: architectureplatform

  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  jwt:
    access-token-expiration: 3600000
    refresh-token-expiration: 604800000